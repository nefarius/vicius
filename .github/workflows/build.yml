name: Build

on:
  push:
    branches: [master]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
    # paths-ignore is not evaluated for tag pushes (GitHub behaviour), so tag
    # releases always build regardless of what files changed.
    paths-ignore:
      - 'assets/**'
      - '**/*.md'
      - '**/*.png'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'assets/**'
      - '**/*.md'
      - '**/*.png'

# Cancel in-flight runs for the same ref (branch / PR).
# Tag pushes are never cancelled so a release is never half-published.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Least-privilege default; the release job overrides contents to write.
permissions:
  contents: read

env:
  UPDATER_NAME: example_Demo_Updater
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHubPackages,readwrite"
  # Parallel matrix jobs may race to push the same internal vcpkg packages;
  # -SkipDuplicate makes nuget exit 0 instead of 1 when a version already exists.
  VCPKG_NUGET_PUSH_OPTIONS: "-SkipDuplicate"

jobs:
  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: windows-2022
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # Solution platform names (x86 maps to Win32 in the .vcxproj)
        platform: [x86, x64, ARM64]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: false
          persist-credentials: false

      - name: Init vcpkg submodule (shallow)
        shell: pwsh
        run: git submodule update --init --depth 1 vcpkg

      - name: Configure NuGet credentials for vcpkg binary cache
        shell: pwsh
        run: |
          nuget sources add `
            -Name "GitHubPackages" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.actor }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      # ── Version stamping ───────────────────────────────────────────────────

      - name: Install vpatch
        shell: pwsh
        run: |
          dotnet tool install --global Nefarius.Tools.Vpatch --version 2.7.0
          # Make the tool available in subsequent steps
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compute build version
        id: version
        shell: pwsh
        run: |
          $ref = '${{ github.ref }}'
          if ($ref -match '^refs/tags/v(.+)$') {
            # Tag build: derive from vX.Y.Z → X.Y.Z.0
            $ver = $Matches[1]
            $parts = $ver.Split('.')
            if ($parts.Count -eq 3) { $ver = "$ver.0" }
          } else {
            # Branch / PR build: mirror the old AppVeyor 1.15.{build} scheme
            $ver = "1.15.0.${{ github.run_number }}"
          }
          "BUILD_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Stamp version into resource file
        shell: pwsh
        run: |
          vpatch `
            --stamp-version "$env:BUILD_VERSION" `
            --target-file ".\src\vīcĭus.rc" `
            --resource.file-version `
            --resource.product-version

      # ── Compile ────────────────────────────────────────────────────────────

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce  # v2

      - name: Build with MSBuild
        shell: pwsh
        run: |
          msbuild "vīcĭus.sln" `
            /m `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:UpdaterName="$env:UPDATER_NAME" `
            /p:CI=true

      # ── Post-build ─────────────────────────────────────────────────────────

      - name: Pack with UPX
        # ARM64 UPX support is experimental; skip it (matches original pipeline)
        if: matrix.platform != 'ARM64'
        shell: pwsh
        run: |
          choco install upx -y --no-progress
          # Output lives under bin\<PlatformShortName>\ where Win32→x86, x64→x64
          $exes = Get-ChildItem -Path "bin" -Filter "*.exe" -Recurse |
                  Where-Object { $_.Name -notlike '*_packed*' }
          foreach ($exe in $exes) {
            $packed = Join-Path $exe.DirectoryName "$($exe.BaseName)_packed.exe"
            upx -9 -o $packed $exe.FullName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: vicius-${{ matrix.platform }}
          path: bin/**/*.exe
          if-no-files-found: error

  # ─── Detect changed paths ──────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.filter.outputs.examples }}
      abstractions: ${{ steps.filter.outputs.abstractions }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
        id: filter
        with:
          filters: |
            examples:
              - 'examples/**'
              - 'abstractions/**'
              - 'examples.sln'
              - '.github/workflows/build.yml'
            abstractions:
              - 'abstractions/**'
              - '!abstractions/docs/**'

  # ─── Build examples ────────────────────────────────────────────────────────
  build-examples:
    name: Build examples solution
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.examples == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: '10.0.x'
      - name: Build examples.sln
        run: dotnet build "examples.sln" -c Release

  # ─── Generate abstractions API docs ────────────────────────────────────────
  generate-abstractions-docs:
    name: Generate Abstractions API docs
    runs-on: ubuntu-latest
    needs: changes
    # Only auto-commit on pushes to master; skip for PRs and when nothing changed.
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.changes.outputs.abstractions == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: master
          fetch-depth: 0   # MinVer needs full history to compute the version

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install XMLDoc2Markdown
        run: dotnet tool install -g Nefarius.Tools.XMLDoc2Markdown

      - name: Build
        run: dotnet build abstractions/Nefarius.Vicius.Abstractions.sln -c Release

      - name: Generate API docs
        run: xmldoc2md abstractions/bin/netstandard2.0/Nefarius.Vicius.Abstractions.dll abstractions/docs/

      - name: Check for changes
        id: check-for-changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add abstractions/docs
          git diff --cached --exit-code || git commit -m "Update API documentation"

      - name: Push changes
        if: success() && steps.check-for-changes.outcome == 'success'
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── E2E Tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (x64)
    runs-on: windows-2022
    needs: [build]
    permissions:
      contents: read
      packages: write   # required to read/write the vcpkg NuGet binary cache

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: false
          persist-credentials: false

      - name: Init vcpkg submodule (shallow)
        shell: pwsh
        run: git submodule update --init --depth 1 vcpkg

      - name: Configure NuGet credentials for vcpkg binary cache
        shell: pwsh
        run: |
          nuget sources add `
            -Name "GitHubPackages" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            -Username "${{ github.actor }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce  # v2

      - name: Set up .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install minisign
        shell: pwsh
        run: |
          # Chocolatey ships a pre-0.9 binary that lacks the -W (passwordless) flag.
          # Download 0.12 directly from the upstream GitHub release instead.
          $zip = Join-Path $env:RUNNER_TEMP 'minisign.zip'
          Invoke-WebRequest `
            -Uri 'https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-win64.zip' `
            -OutFile $zip
          Expand-Archive -Path $zip `
            -DestinationPath (Join-Path $env:RUNNER_TEMP 'minisign') -Force
          $exe = Join-Path $env:RUNNER_TEMP 'minisign' 'minisign-win64' 'x86_64' 'minisign.exe'
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $exe)

      # ── Ephemeral signing key (generated fresh every run, never committed) ──

      - name: Generate ephemeral minisign keypair
        shell: pwsh
        run: |
          minisign -G -W `
            -p "$env:RUNNER_TEMP\e2e.pub" `
            -s "$env:RUNNER_TEMP\e2e.key"
          # Second line of the .pub file is the raw base64 key string (RWS...)
          $pubKey = (Get-Content "$env:RUNNER_TEMP\e2e.pub")[1]
          "E2E_MINISIGN_PUBKEY=$pubKey" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write signed-manifest variant customize header
        shell: pwsh
        run: |
          $template = Get-Content 'tests\e2e\include\sig\ViciusPostCustomizeMe.h.tpl' -Raw
          $header = $template.Replace('%%PUBLIC_KEY%%', $env:E2E_MINISIGN_PUBKEY)
          Set-Content -Path 'tests\e2e\include\sig\ViciusPostCustomizeMe.h' -Value $header

      # ── Compile E2E updater variants (x64 only) ────────────────────────────

      - name: Build main E2E updater (NV_FLAGS_ALLOW_HTTP_DOWNLOAD, localhost URL)
        shell: pwsh
        run: |
          msbuild "vīcĭus.sln" `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:UpdaterName="e2e_Main_Updater" `
            /p:CustomIncludes="$env:GITHUB_WORKSPACE\tests\e2e\include\main\" `
            /p:CI=true

      - name: Build signed-manifest E2E updater (+ NV_MANIFEST_PUBLIC_KEY)
        shell: pwsh
        run: |
          # Each updater variant compiles into its own IntDir (keyed by
          # UpdaterName in the .vcxproj), so this variant always builds fresh
          # against the sig CustomIncludes without disturbing the main variant's
          # already-produced bin\x64\e2e_Main_Updater.exe. No /t:Rebuild needed.
          msbuild "vīcĭus.sln" `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:UpdaterName="e2eSig_Sig_Updater" `
            /p:CustomIncludes="$env:GITHUB_WORKSPACE\tests\e2e\include\sig\" `
            /p:CI=true

      # ── Build .NET components ──────────────────────────────────────────────

      - name: Publish setup stub (framework-dependent, win-x64)
        shell: pwsh
        run: |
          dotnet publish examples\e2e-setup-stub\e2e-setup-stub.csproj `
            -c Release -r win-x64 --no-self-contained `
            -o stub-publish

      - name: Build example server (for --no-build run in driver)
        shell: pwsh
        run: dotnet build examples\server\server.csproj -c Release --nologo

      # ── Negative-control artifact ──────────────────────────────────────────

      - name: Download vicius-x64 artifact (for HttpRejected test)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: vicius-x64
          path: prod-artifact

      # ── Prepare E2E_ARTIFACTS_DIR ──────────────────────────────────────────

      - name: Create artifacts directory and base files
        shell: pwsh
        run: |
          $dir = "$env:GITHUB_WORKSPACE\e2e-artifacts"
          New-Item -ItemType Directory -Path $dir -Force

          # payload.zip — tiny archive the HappyZip updater will extract
          $zipSrc = Join-Path $env:RUNNER_TEMP "zip-content"
          New-Item -ItemType Directory -Path $zipSrc -Force
          Set-Content -Path (Join-Path $zipSrc "test.txt") `
            -Value "E2E test payload - vicius integration test"
          Compress-Archive -Path "$zipSrc\*" `
            -DestinationPath (Join-Path $dir "payload.zip") -Force

          # setup.exe — the stub installer (must be a real PE; the apphost qualifies)
          Copy-Item -Path "stub-publish\e2e-setup-stub.exe" `
            -Destination (Join-Path $dir "setup.exe")

          # updater_selfupdate.exe — the binary the self-updater DLL tries to swap in
          Copy-Item -Path "bin\x64\e2e_Main_Updater.exe" `
            -Destination (Join-Path $dir "updater_selfupdate.exe")

          # corrupt_version.bin — non-PE bytes; GetWin32ResourceFileVersion returns the
          # sentinel 0.0.1 for files with no readable version resource, allowing the
          # CorruptFileVersion scenario to exercise that path without crashing.
          [System.IO.File]::WriteAllBytes(
            (Join-Path $dir "corrupt_version.bin"),
            [byte[]](0x00, 0x01, 0x02, 0x03, 0xFF, 0xFE, 0xFD, 0xFC))

          # Export paths for subsequent steps
          $hash = (Get-FileHash (Join-Path $dir "payload.zip") -Algorithm SHA256).Hash.ToLowerInvariant()
          "E2E_PAYLOAD_HASH=$hash" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "E2E_ARTIFACTS_DIR=$dir"  | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate, sign, and tamper the SignedManifest manifests
        shell: pwsh
        run: |
          $dir = $env:E2E_ARTIFACTS_DIR
          New-Item -ItemType Directory -Path (Join-Path $dir 'SignedManifest')    -Force
          New-Item -ItemType Directory -Path (Join-Path $dir 'TamperedManifest') -Force

          # Build the manifest as a PowerShell ordered hashtable and serialise with
          # ConvertTo-Json.  A here-string (@"..."@) cannot be used here because
          # its closing delimiter must sit at column 0, which conflicts with the YAML
          # block-scalar indentation rules and triggers a YAML parse error.
          $hash = $env:E2E_PAYLOAD_HASH
          $manifestObj = [ordered]@{
            shared = [ordered]@{
              windowTitle               = 'E2E Signed Manifest Test'
              productName               = 'E2E Test Product'
              signatureVerificationMode = 'Disabled'
            }
            releases = @(
              [ordered]@{
                name        = 'E2E Signed Update v2.0.0'
                version     = '2.0.0'
                publishedAt = '2026-01-01T00:00:00Z'
                downloadUrl = 'http://localhost:5200/api/e2e/artifacts/payload.zip'
                checksum    = [ordered]@{
                  checksumAlg = 'SHA256'
                  checksum    = $hash
                }
              }
            )
          }
          $manifest = $manifestObj | ConvertTo-Json -Depth 10

          $manifestPath = Join-Path $dir 'SignedManifest\updates.json'
          # Write with LF line endings so minisign signs exactly the bytes the
          # server will serve (the endpoint uses File.OpenRead, not text mode).
          [System.IO.File]::WriteAllText($manifestPath, $manifest.Replace("`r`n", "`n"))

          # Sign with the ephemeral key (produces updates.json.minisig next to the file)
          minisign -S -s "$env:RUNNER_TEMP\e2e.key" -m $manifestPath

          # Tampered copy: mutate one field so the original signature no longer
          # covers the body — the client should return NV_E_SERVER_RESPONSE=104.
          $tampered = $manifest.Replace('"version": "2.0.0"', '"version": "9.9.9"')
          [System.IO.File]::WriteAllText(
            (Join-Path $dir 'TamperedManifest\updates.json'),
            $tampered.Replace("`r`n", "`n"))
          # Note: the server endpoint intentionally serves the ORIGINAL .minisig
          # for TamperedManifest requests — no copy needed here.

      # ── Run the test suite ─────────────────────────────────────────────────

      - name: Run E2E test suite
        shell: pwsh
        run: |
          pwsh tests\e2e\run-e2e.ps1 `
            -MainBin      "bin\x64\e2e_Main_Updater.exe" `
            -SigBin       "bin\x64\e2eSig_Sig_Updater.exe" `
            -ProdBin      "prod-artifact\x64\example_Demo_Updater.exe" `
            -ArtifactsDir "$env:E2E_ARTIFACTS_DIR" `
            -ServerDir    "examples\server" `
            -LogDir       "e2e-logs"

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: e2e-logs
          path: e2e-logs/**
          if-no-files-found: ignore

  # ─── Release ───────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: artifacts/**/*.exe
          generate_release_notes: true
