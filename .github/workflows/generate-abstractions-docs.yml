name: Generate Abstractions API Documentation

on:
  push:
    branches: ["master"]
    paths:
      - 'abstractions/**'
      - '!abstractions/docs/**'

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: master
          fetch-depth: 0   # MinVer needs full history to compute the version

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install XMLDoc2Markdown
        run: dotnet tool install -g Nefarius.Tools.XMLDoc2Markdown

      - name: Build
        run: dotnet build abstractions/Nefarius.Vicius.Abstractions.sln -c Release

      - name: Generate API docs
        run: xmldoc2md abstractions/bin/netstandard2.0/Nefarius.Vicius.Abstractions.dll abstractions/docs/

      - name: Check for changes
        id: check-for-changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add abstractions/docs
          git diff --cached --exit-code || git commit -m "Update API documentation"

      - name: Push changes
        if: success() && steps.check-for-changes.outcome == 'success'
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
